name: website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/website.yml'
  pull_request:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/website.yml'
  workflow_dispatch:

permissions:
  contents: read
  # security-events: write  # re-enable when repo is public (or GHAS is on) so upload-sarif can post to Code Scanning

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: lukadimnik/website
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build image (load for scanning)
        uses: docker/build-push-action@v7
        with:
          context: ./website
          load: true
          tags: website:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: website:scan
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'

      # Disabled while repo is private — Code Scanning requires GitHub Advanced Security on private repos.
      # Re-enable (along with `security-events: write` above) once the repo is public.
      # - name: Upload Trivy results to GitHub Security
      #   if: always()
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: trivy-results.sarif
      #     category: trivy

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: website:scan
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.spdx.json

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: ./website
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
